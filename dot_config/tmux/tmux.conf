# =============================================================================
# tmux — Ghostty keyboard-native agent cockpit (chezmoi-6an)
# Vendored plugins via chezmoiexternal + Homebrew (no TPM). Spec:
# docs/superpowers/specs/2026-06-13-ghostty-tmux-agent-cockpit-design.md
# =============================================================================

# PATH for homebrew (vendored plugin run-shell + tools)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# --- Base -------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
# indexed form (not -as) avoids stacking duplicate caps on source-file reload
set -s terminal-features[1] "xterm-256color:RGB"

# Mouse OFF — Ghostty owns the mouse (no mouse reporting). prefix-m toggles live.
set -g mouse off
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# Shift+Enter -> CSI-u for Claude Code
bind -n S-Enter send-keys Escape "[13;2u"

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"

# --- Clipboard (native OSC-52; SSH-portable) --------------------------------
set -s set-clipboard on
set -g allow-passthrough on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Splits / panes ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Native directional pane nav (replaces vim-tmux-navigator)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Window / session switching --------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Tab last-window
bind -n M-[ previous-window
bind -n M-] next-window
bind w choose-tree -Zw
bind o run-shell '~/.local/bin/sesh-picker.sh'
bind -n M-s run-shell '~/.local/bin/sesh-picker.sh'
bind N command-prompt -p "New session:" "new-session -s '%%'"

# --- Attention loop ---------------------------------------------------------
# Claude hook emits a BEL via terminalSequence; monitor-bell lights the window
# flag (shown by catppuccin @..._window_flags "icon"). No focus steal.
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other
# prefix-b: jump to the next window awaiting attention (bell flag set)
bind b run-shell '~/.local/bin/tmux-jump-needy'

# --- Discoverability: native which-key-style action menu (prefix + Space) ----
# Pure tmux display-menu (no plugin): a tailored cheat-sheet + launcher of the
# real binds. Keys mirror the actual prefix bindings so it teaches as you use it.
bind Space display-menu -T "#[align=centre,fg=#c6a0f6,bold]  tmux actions " -x C -y C \
  "sesh picker"          o "run-shell '~/.local/bin/sesh-picker.sh'" \
  "window tree"          w "choose-tree -Zw" \
  "new window"           c "new-window -c '#{pane_current_path}'" \
  "" "" "" \
  "split right"          | "split-window -h -c '#{pane_current_path}'" \
  "split down"           - "split-window -v -c '#{pane_current_path}'" \
  "zoom pane"            z "resize-pane -Z" \
  "kill pane"            x "confirm-before -p 'kill pane? (y/n)' kill-pane" \
  "" "" "" \
  "copy mode"            [ "copy-mode" \
  "fingers hint-copy"    f "run-shell -b 'tmux-fingers start #{pane_id}'" \
  "jump to needy win"    b "run-shell '~/.local/bin/tmux-jump-needy'" \
  "" "" "" \
  "toggle mouse"         m "set -g mouse" \
  "reload config"        r "source-file ~/.config/tmux/tmux.conf"

# --- Theme (catppuccin v2.3.0) ----------------------------------------------
set -g status-left-length 100
set -g status-right-length 100
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# Window labels: index + cwd basename. Set PLAIN (set -g, not -gF) so the
# #{b:pane_current_path} value is NOT force-expanded at definition (freeze gotcha).
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g @catppuccin_window_flags "icon"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-left ""
set -g status-interval 5
# -g (replace) resets the chain each reload (idempotent); -ag appends after.
# Segment 1 = attention count (windows awaiting you); segment 2 = catppuccin session.
set -g status-right "#(~/.local/bin/claude-attention-count)"
set -ag status-right "#{E:@catppuccin_status_session}"

# --- Plugins (load LAST) ----------------------------------------------------
# extrakto: vendored repo (Python + fzf)
run-shell ~/.config/tmux/plugins/extrakto/extrakto.tmux
# tmux-fingers: brew ships only the binary; `load-config` is the integration
# (binds @fingers-key, default prefix-F) — skips the repo wrapper's update wizard.
run-shell "tmux-fingers load-config"
