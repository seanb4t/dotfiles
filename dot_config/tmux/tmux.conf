# =============================================================================
# TMUX Configuration - Catppuccin Macchiato
# =============================================================================

# Fix PATH for homebrew on macOS (required for TPM)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Set prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g focus-events on
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
setw -g monitor-activity off
set -g visual-activity off

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Forward shift+enter as CSI u sequence to applications (for Claude Code)
bind -n S-Enter send-keys Escape "[13;2u"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Resize panes with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Previous/next window
bind -n M-[ previous-window
bind -n M-] next-window

# Floating popup terminal (native tmux 3.3+)
bind -n M-f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Session manager (sesh + fzf-tmux popup)
bind o run-shell '~/.local/bin/sesh-picker.sh'

# New session (prompts for name)
bind N command-prompt -p "New session:" "new-session -s '%%'"

# Move current window to another session (fzf picker)
bind M-o display-popup -E -w 40% -h 40% \
  "tmux list-sessions -F '#{session_name}' \
    | grep -v \"^$(tmux display-message -p '#{session_name}')\$\" \
    | fzf-tmux -p --reverse --header='Move window to session' \
    | xargs -I{} tmux move-window -t '{}:'"

# Copy mode (vim-style)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Catppuccin Theme
# -----------------------------------------------------------------------------

set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_window_status_style "rounded"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Remap vim-tmux-navigator from C-hjkl to M-hjkl (frees C-k kill-line, C-l clear, etc.)
set -g @vim_navigator_mapping_left  'M-h'
set -g @vim_navigator_mapping_down  'M-j'
set -g @vim_navigator_mapping_up    'M-k'
set -g @vim_navigator_mapping_right 'M-l'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'

# -----------------------------------------------------------------------------
# Plugin Settings
# -----------------------------------------------------------------------------

# Resurrect & Continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# tmux-thumbs (Rust-based hint copy)
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | pbcopy'

# tmux-fzf-url
set -g @fzf-url-bind 'u'

# Unbind default vim-tmux-navigator C-hjkl (now using M-hjkl above)
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
