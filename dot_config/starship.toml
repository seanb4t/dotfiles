# Don't print a newline at the start of the prompt
add_newline = false

[directory]
format = "[ ÔĪģ $path ]($style)"
style = "fg:#E4E4E4 bg:#3B76F0"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "ÓúČ Ôźė "
style = "fg:#1C3A5E bg:#FCF392"

[git_status]
format = '[$all_status]($style)'
style = "fg:#1C3A5E bg:#FCF392"

[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "fg:#1C3A5E bg:#FCF392"
deleted_style = "fg:bright-red bg:235"
disabled = false

[cmd_duration]
format = "[ ÔôŹ $duration ]($style)"
style = "fg:bright-white bg:18"

# Replace the "‚ĚĮ" symbol in the prompt with "‚ěú"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[‚ěú](bold green)"     # The "success_symbol" segment is being set to "‚ěú" with the color "bold green"
error_symbol = '[ ‚úó](#E84D44) '

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ůĪĎć $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'

[docker_context]
format = 'via [ūüźč $context](blue bold)'

# Disable the package module, hiding it from the prompt completely
